<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Quote</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; padding: 2rem 1rem; }
  .wrap { max-width: 620px; margin: 0 auto; }
  .header { margin-bottom: 2rem; }
  .header h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
  .header p { font-size: 14px; color: #666; }
  .card { background: #fff; border: 1px solid #e8e8e6; border-radius: 12px; padding: 1.25rem; margin-bottom: 12px; }
  label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
  .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field { margin-bottom: 12px; }
  .field:last-child { margin-bottom: 0; }
  input[type=text], input[type=number], textarea {
    width: 100%; padding: 8px 10px; font-size: 14px; border: 1px solid #ddd;
    border-radius: 8px; background: #fff; color: #1a1a1a; font-family: inherit;
  }
  input[type=text]:focus, input[type=number]:focus, textarea:focus { outline: 2px solid #888; border-color: transparent; }
  .modes-head { display: grid; grid-template-columns: 2fr 90px 110px 90px 28px; gap: 8px; margin-bottom: 6px; }
  .modes-head span { font-size: 11px; color: #888; font-weight: 500; }
  .mode-row { display: grid; grid-template-columns: 2fr 90px 110px 90px 28px; gap: 8px; align-items: center; margin-bottom: 8px; }
  .mode-row input[type=number].yellow { background: #fffbe6; border-color: #d4b800; }
  .mode-total { font-size: 14px; text-align: right; }
  .remove-btn { background: none; border: none; cursor: pointer; color: #bbb; font-size: 18px; line-height: 1; padding: 0; }
  .remove-btn:hover { color: #888; }
  .add-btn { font-size: 13px; color: #666; background: none; border: 1px dashed #ccc; border-radius: 8px; padding: 6px 14px; cursor: pointer; margin-top: 4px; }
  .add-btn:hover { background: #f5f5f3; }
  .fee-row { display: flex; align-items: center; justify-content: space-between; }
  .fee-input-wrap { display: flex; align-items: center; gap: 6px; }
  .fee-input-wrap span { font-size: 13px; color: #666; }
  .fee-input-wrap input { width: 120px; text-align: right; }
  .summary { background: #f5f5f3; }
  .summary-line { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; color: #555; }
  .summary-total { display: flex; justify-content: space-between; padding-top: 10px; border-top: 1px solid #ddd; font-size: 16px; font-weight: 500; color: #1a1a1a; }
  textarea { resize: vertical; height: 90px; }
  .note { font-size: 12px; color: #aaa; margin-top: 8px; }
  .wick { font-size: 12px; color: #bbb; text-align: center; margin-top: 1.5rem; }
  @media (max-width: 500px) {
    .meta-grid { grid-template-columns: 1fr; }
    .modes-head, .mode-row { grid-template-columns: 1fr 70px 90px 70px 24px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1 id="proj-title">Project quote</h1>
    <p id="proj-sub" style="display:none"></p>
  </div>

  <div class="card">
    <div class="meta-grid">
      <div class="field">
        <label>Client</label>
        <input type="text" id="client" placeholder="Client name" oninput="updateHeader()">
      </div>
      <div class="field">
        <label>Project name</label>
        <input type="text" id="project" placeholder="e.g. GA CD 09 Primary" oninput="updateHeader()">
      </div>
    </div>
    <div class="field">
      <label>Target audience</label>
      <input type="text" id="audience" placeholder="e.g. GA CD 09 likely primary election voters">
    </div>
  </div>

  <div class="card">
    <div class="modes-head">
      <span>Mode</span><span>CPI ($)</span><span style="text-align:center">Completes ✏</span><span style="text-align:right">Total</span><span></span>
    </div>
    <div id="modes"></div>
    <button class="add-btn" onclick="addMode()">+ add mode</button>
  </div>

  <div class="card">
    <div class="fee-row">
      <label style="margin:0;font-size:13px;font-weight:500;color:#1a1a1a">Project / service fee</label>
      <div class="fee-input-wrap">
        <span>$</span>
        <input type="number" id="base-fee" value="1400" min="0" oninput="calc()">
      </div>
    </div>
  </div>

  <div class="card summary">
    <div class="summary-line"><span>Interviewing costs</span><span id="s-interviews">$0.00</span></div>
    <div class="summary-line"><span>Project fee</span><span id="s-fee">$1,400.00</span></div>
    <div class="summary-total"><span>Total</span><span id="s-total">$0.00</span></div>
  </div>

  <div class="card">
    <label>Fielding notes / timeline</label>
    <textarea id="notes" placeholder="e.g. Fielding window: April 10–12. Results delivered within 48 hours of close."></textarea>
  </div>

  <p class="note">✏ = client-editable. Adjust completes to fit your budget — totals update automatically.</p>
  <p class="wick">Powered by Wick</p>
</div>

<script>
let modes = [
  { name: "P2P Survey", cpi: 14.50, completes: 300 },
  { name: "IVR Survey", cpi: 3.00, completes: 300 },
];

function fmt(n) {
  return n.toLocaleString("en-US", { style: "currency", currency: "USD" });
}

function renderModes() {
  const el = document.getElementById("modes");
  el.innerHTML = modes.map((m, i) => `
    <div class="mode-row">
      <input type="text" value="${m.name}" placeholder="Mode name" oninput="modes[${i}].name=this.value">
      <input type="number" value="${m.cpi}" min="0" step="0.01" placeholder="0.00" oninput="modes[${i}].cpi=parseFloat(this.value)||0;calc()">
      <input type="number" class="yellow" value="${m.completes}" min="0" placeholder="0" oninput="modes[${i}].completes=parseInt(this.value)||0;calc()">
      <span class="mode-total" id="mt${i}">${fmt(m.cpi * m.completes)}</span>
      <button class="remove-btn" onclick="removeMode(${i})">×</button>
    </div>
  `).join("");
  calc();
}

function calc() {
  let interviews = 0;
  modes.forEach((m, i) => {
    const t = (parseFloat(m.cpi)||0) * (parseInt(m.completes)||0);
    interviews += t;
    const el = document.getElementById("mt" + i);
    if (el) el.textContent = fmt(t);
  });
  const fee = parseFloat(document.getElementById("base-fee").value) || 0;
  document.getElementById("s-interviews").textContent = fmt(interviews);
  document.getElementById("s-fee").textContent = fmt(fee);
  document.getElementById("s-total").textContent = fmt(interviews + fee);
}

function addMode() {
  modes.push({ name: "", cpi: 0, completes: 0 });
  renderModes();
}

function removeMode(i) {
  modes.splice(i, 1);
  renderModes();
}

function updateHeader() {
  const c = document.getElementById("client").value;
  const p = document.getElementById("project").value;
  document.getElementById("proj-title").textContent = p || "Project quote";
  const sub = document.getElementById("proj-sub");
  if (c) { sub.textContent = c; sub.style.display = "block"; }
  else sub.style.display = "none";
}

renderModes();
</script>
</body>
</html>
